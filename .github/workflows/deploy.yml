name: CI / CD → AWS Lightsail

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1          # change to your Lightsail region
  ECR_REPOSITORY: portofolio          # ECR repo name
  LIGHTSAIL_SERVICE: portofolio-svc   # Lightsail container service name
  CONTAINER_NAME: portofolio          # container name inside the service

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Lint & type-check
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Build & push Docker image to Amazon ECR, deploy to Lightsail
  #    Runs only on push to main (not on PRs)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write   # required for OIDC authentication
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                       -t $REGISTRY/$ECR_REPOSITORY:latest .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to Lightsail container service
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          aws lightsail create-container-service-deployment \
            --service-name "$LIGHTSAIL_SERVICE" \
            --containers "{
              \"$CONTAINER_NAME\": {
                \"image\": \"$IMAGE\",
                \"ports\": {\"3000\": \"HTTP\"},
                \"environment\": {
                  \"NODE_ENV\": \"production\",
                  \"PORT\": \"3000\",
                  \"HOSTNAME\": \"0.0.0.0\"
                }
              }
            }" \
            --public-endpoint "{
              \"containerName\": \"$CONTAINER_NAME\",
              \"containerPort\": 3000,
              \"healthCheck\": {
                \"path\": \"/\",
                \"intervalSeconds\": 10,
                \"timeoutSeconds\": 5,
                \"successCodes\": \"200-299\",
                \"unhealthyThreshold\": 3,
                \"healthyThreshold\": 2
              }
            }"

      - name: Wait for deployment to succeed
        run: |
          echo "Waiting for Lightsail deployment to reach ACTIVE state..."
          for i in $(seq 1 30); do
            STATE=$(aws lightsail get-container-services \
              --service-name "$LIGHTSAIL_SERVICE" \
              --query "containerServices[0].state" \
              --output text)
            echo "  attempt $i: state=$STATE"
            if [ "$STATE" = "RUNNING" ]; then
              echo "Deployment successful."
              exit 0
            fi
            sleep 20
          done
          echo "Deployment did not reach RUNNING state in time." >&2
          exit 1
