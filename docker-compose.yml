services:
  portofolio:
    image: ghcr.io/mrohadi/portofolio:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    networks: [caddy]
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO/dev/null http://localhost:3000 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  caddy:
    external: true
